    <!-- Prevent flash of wrong theme — runs synchronously before first paint -->
    <script>
      (function () {
        var stored = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = stored === 'dark' || (stored === null && prefersDark);
        if (isDark) document.documentElement.classList.add('dark');
        var palette = localStorage.getItem('palette') || 'cyan';
        document.documentElement.classList.add('palette-' + palette);
      })();
    </script>
