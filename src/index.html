<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Luc Allaire — Software Developer</title>
    <meta
      name="description"
      content="Software developer specializing in Kotlin Multiplatform — building shared-first systems that ship on Android and iOS, with a secondary stack in Angular and TypeScript."
    />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <!-- Prevent flash of wrong theme — runs synchronously before first paint -->
    <script>
      (function () {
        var stored = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = stored === 'dark' || (stored === null && prefersDark);
        if (isDark) document.documentElement.classList.add('dark');
        var palette = localStorage.getItem('palette') || 'cyan';
        document.documentElement.classList.add('palette-' + palette);
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
