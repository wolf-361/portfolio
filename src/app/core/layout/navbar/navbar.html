<mat-toolbar class="navbar">
  <!-- Brand -->
  <button class="brand" (click)="scrollTo('hero')">
    <span class="brand-prefix">~/</span>luc.allaire
  </button>

  <!-- Desktop anchor nav -->
  <nav class="nav-links" aria-label="Navigation principale">
    @for (item of navItems; track item.fragment) {
      <button
        class="nav-link"
        [class.active]="isActive(item.fragment)"
        (click)="scrollTo(item.fragment)"
      >
        <span class="nav-index">{{ item.index }}</span>
        <span class="nav-sep">.</span>
        <span class="nav-label">{{ lang.t(item.labelEn, item.labelFr) }}</span>
        <span class="nav-cursor" aria-hidden="true">_</span>
      </button>
    }
  </nav>

  <span class="spacer"></span>

  <!-- CV download -->
  <a mat-stroked-button class="cv-btn" href="assets/cv.pdf" target="_blank" rel="noopener" download>
    CV
  </a>

  <!-- Lang toggle -->
  <button
    mat-button
    class="lang-btn"
    [matTooltip]="lang.t('Switch to French', 'Switch to English')"
    (click)="lang.toggle()"
  >
    <span class="lang-label">{{ lang.t('FR', 'EN') }}</span>
  </button>

  <!-- Theme toggle -->
  <button
    mat-icon-button
    class="theme-btn"
    [matTooltip]="theme.isDark() ? 'Light mode' : 'Dark mode'"
    (click)="theme.toggle()"
  >
    <mat-icon>{{ theme.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>

  <!-- Mobile hamburger — shows overlay instead of mat-menu -->
  <button
    class="hamburger"
    mat-icon-button
    [attr.aria-label]="lang.t('Open menu', 'Ouvrir le menu')"
    (click)="openMobileNav()"
  >
    <mat-icon>menu</mat-icon>
  </button>
</mat-toolbar>

<!-- Full-screen mobile nav overlay -->
@if (mobileNavOpen()) {
  <app-mobile-nav (closed)="closeMobileNav()" />
}
