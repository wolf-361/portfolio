<mat-toolbar class="navbar">
  <a class="brand" routerLink="/">Luc Allaire</a>

  <nav class="nav-links">
    <a
      class="nav-link"
      routerLink="/"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <span class="nav-index">01</span>
      <span class="nav-sep">//</span>
      <span class="nav-label">{{ lang.t('home', 'accueil') }}</span>
      <span class="nav-cursor" aria-hidden="true">_</span>
    </a>
    <a class="nav-link" routerLink="/projects" routerLinkActive="active">
      <span class="nav-index">02</span>
      <span class="nav-sep">//</span>
      <span class="nav-label">{{ lang.t('projects', 'projets') }}</span>
      <span class="nav-cursor" aria-hidden="true">_</span>
    </a>
  </nav>

  <span class="spacer"></span>

  <!-- CV download -->
  <a mat-stroked-button class="cv-btn" href="assets/cv.pdf" target="_blank" rel="noopener" download>
    CV
  </a>

  <!-- Lang toggle -->
  <button
    mat-icon-button
    class="lang-btn"
    [matTooltip]="lang.t('Passer en français', 'Switch to English')"
    (click)="lang.toggle()"
  >
    <span class="lang-label">{{ lang.t('FR', 'EN') }}</span>
  </button>

  <!-- Theme toggle -->
  <button
    mat-icon-button
    [matTooltip]="theme.isDark() ? 'Switch to light' : 'Switch to dark'"
    (click)="theme.toggle()"
  >
    <mat-icon>{{ theme.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>

  <!-- Mobile hamburger -->
  <button class="hamburger" mat-icon-button [matMenuTriggerFor]="mobileMenu">
    <mat-icon>menu</mat-icon>
  </button>
</mat-toolbar>

<mat-menu #mobileMenu="matMenu">
  <a mat-menu-item routerLink="/">
    <mat-icon>home</mat-icon>
    01 // {{ lang.t('home', 'accueil') }}
  </a>
  <a mat-menu-item routerLink="/projects">
    <mat-icon>folder</mat-icon>
    02 // {{ lang.t('projects', 'projets') }}
  </a>
  <a mat-menu-item href="assets/cv.pdf" target="_blank" rel="noopener" download>
    <mat-icon>description</mat-icon>
    CV
  </a>
  <button mat-menu-item (click)="lang.toggle()">
    <mat-icon>translate</mat-icon>
    {{ lang.t('Français', 'English') }}
  </button>
</mat-menu>
