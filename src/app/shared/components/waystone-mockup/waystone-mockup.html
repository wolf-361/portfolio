<div class="phone-frame">
  <div class="phone-island"></div>

  <div class="phone-status-bar">
    <span class="phone-time">9:41</span>
    <div class="phone-status-icons">
      <div class="phone-status-icon"></div>
    </div>
  </div>

  <div class="ws-content">
    <!-- App header -->
    <div class="ws-header">
      <span class="ws-map-name">Eldreth Wilds</span>
      <span class="ws-pin-count mono">12 pins</span>
    </div>

    <!-- Category tabs -->
    <div class="ws-tabs">
      <span class="ws-tab ws-tab--active">All</span>
      <span class="ws-tab">Dungeons</span>
      <span class="ws-tab">NPCs</span>
      <span class="ws-tab">Quests</span>
    </div>

    <!-- Map canvas -->
    <div class="ws-map" aria-hidden="true">
      <div class="ws-map-grid"></div>

      <!-- Pins -->
      <div class="ws-pin ws-pin--dungeon" style="left: 22%; top: 28%">
        <span class="ws-pin-dot"></span>
        <span class="ws-pin-label">Crystal Cave</span>
      </div>
      <div class="ws-pin ws-pin--quest" style="left: 60%; top: 40%">
        <span class="ws-pin-dot"></span>
        <span class="ws-pin-label">Elder Mira</span>
      </div>
      <div class="ws-pin ws-pin--location" style="left: 42%; top: 62%">
        <span class="ws-pin-dot"></span>
        <span class="ws-pin-label">Keep Ruins</span>
      </div>
      <div class="ws-pin ws-pin--hidden" style="left: 74%; top: 22%">
        <span class="ws-pin-dot"></span>
      </div>
      <div class="ws-pin ws-pin--hidden" style="left: 18%; top: 70%">
        <span class="ws-pin-dot"></span>
      </div>

      <!-- Fog of war -->
      <div class="ws-fog ws-fog--tr"></div>
      <div class="ws-fog ws-fog--bl"></div>
    </div>

    <!-- Pin list -->
    <div class="ws-list">
      <div class="ws-list-item">
        <span class="ws-dot ws-dot--dungeon"></span>
        <div class="ws-item-info">
          <span class="ws-item-name">Crystal Cave</span>
          <span class="ws-item-tag">Dungeon</span>
        </div>
        <span class="ws-item-arr">›</span>
      </div>
      <div class="ws-list-item">
        <span class="ws-dot ws-dot--quest"></span>
        <div class="ws-item-info">
          <span class="ws-item-name">Elder Mira</span>
          <span class="ws-item-tag">NPC · Quest</span>
        </div>
        <span class="ws-item-arr">›</span>
      </div>
      <div class="ws-list-item">
        <span class="ws-dot ws-dot--location"></span>
        <div class="ws-item-info">
          <span class="ws-item-name">Keep Ruins</span>
          <span class="ws-item-tag">Location</span>
        </div>
        <span class="ws-item-arr">›</span>
      </div>
    </div>
  </div>
</div>
